  <!-- Instant Preloader Stylesheet -->
  <style>
    #app-preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #05070a;
      z-index: 10000;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.8s;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
    }

    .preloader-content {
      text-align: center;
      position: relative;
    }

    .preloader-logo {
      font-weight: 800;
      font-size: 1.8rem;
      letter-spacing: 0.1em;
      color: #ffffff;
      margin-bottom: 1.5rem;
      position: relative;
      text-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
    }

    .preloader-logo span {
      color: #00f0ff;
    }

    .preloader-bar {
      width: 200px;
      height: 2px;
      background: rgba(255, 255, 255, 0.08);
      margin: 0 auto;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .preloader-progress {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00f0ff, #bd00ff);
      box-shadow: 0 0 8px #00f0ff;
      animation: load-progress 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes load-progress {
      0% { width: 0%; }
      30% { width: 40%; }
      60% { width: 75%; }
      100% { width: 100%; }
    }

    /* preloader exit modifier */
    #app-preloader.loaded {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
  </style>

  <!-- SEO: Structured Data (JSON-LD) -->
  <script type="application/ld+json">

<body>
  <!-- Global Noise Overlay -->
  <div class="noise-overlay"></div>

  <!-- Global preloader -->
  <div id="app-preloader">
    <div class="preloader-content">
      <div class="preloader-logo">&lt; <span>SHIHABUL HAQUE</span> /&gt;</div>
      <div class="preloader-bar">
        <div class="preloader-progress"></div>
      </div>
    </div>
  </div>

  <app-root></app-root>

  <script>
    // Fade out preloader on window load
    window.addEventListener('load', function () {
      const preloader = document.getElementById('app-preloader');
      setTimeout(function() {
        if (preloader) {
          preloader.classList.add('loaded');
        }
      }, 500); // Small delay for smooth exit transition
    });
  </script>
</body>
