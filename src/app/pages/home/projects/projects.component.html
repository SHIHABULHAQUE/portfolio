<section class="section projects-section" id="projects">
  <div class="container">
    <div class="section-header">
      <span class="section-subtitle bracket-text">Portfolio</span>
      <h2 class="section-title">Featured Projects</h2>
    </div>

    <div class="projects-grid">
      <div class="project-card" *ngFor="let project of projects; let i = index">
        <div class="card-visual">
          <div class="folder-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
          </div>
          <div class="external-link" *ngIf="project.link">
            <a [href]="project.link" target="_blank">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                <polyline points="15 3 21 3 21 9"></polyline>
                <line x1="10" y1="14" x2="21" y2="3"></line>
              </svg>
            </a>
          </div>
        </div>

        <div class="card-body">
          <h3 class="project-title">{{ project.title }}</h3>
          <p class="project-desc">{{ project.description }}</p>

          <div class="tech-stack">
            <span class="tech-pill" *ngFor="let tech of project.technologies">{{ tech }}</span>
          </div>

          <div class="card-actions">
            <!-- Optional: Detailed view or code link -->
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
